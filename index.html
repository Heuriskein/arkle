<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkle – Daily Ark Nova Animal Puzzle</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --green: #4a9e5c;
      --yellow: #c8922a;
      --red: #8b2020;
      --text: #e8e0d0;
      --muted: #8a8070;
      --gold: #d4a836;
      --border: #2a2a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 10px;
      color: var(--gold);
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(212,168,54,0.3);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      font-size: 0.78rem;
      flex-wrap: wrap;
      justify-content: center;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .input-area {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    #guess-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #guess-input:focus { border-color: var(--gold); }
    #guess-input.error { border-color: #c0392b; }

    #submit-btn {
      padding: 12px 22px;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    #submit-btn:hover { opacity: 0.85; }
    #submit-btn:disabled { opacity: 0.4; cursor: default; }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .autocomplete-list div {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .autocomplete-list div:hover,
    .autocomplete-list div.ac-active {
      background: var(--card);
    }

    .status-line {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 16px;
      height: 18px;
    }

    .table-wrapper {
      width: 100%;
      max-width: 900px;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 620px;
    }

    thead th {
      padding: 8px 10px;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; padding-left: 14px; }

    td {
      padding: 10px 10px;
      text-align: center;
      font-size: 0.85rem;
      border: 1px solid var(--border);
    }

    td.name-cell {
      text-align: left;
      font-weight: 600;
      padding-left: 14px;
      background: var(--surface) !important;
      white-space: nowrap;
      color: var(--text);
    }

    td.cell-green  { background: var(--green); color: #fff; }
    td.cell-yellow { background: var(--yellow); color: #fff; }
    td.cell-red    { background: var(--red);   color: #ddd; }

    .message {
      margin-top: 24px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      min-height: 28px;
    }

    .message.win  { color: #6fcf97; }
    .message.lose { color: #eb5757; }

    .reveal-answer {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    #bonus-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: var(--card);
      color: var(--gold);
      border: 2px solid var(--gold);
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    #bonus-btn:hover {
      background: var(--gold);
      color: #111;
    }

    .bonus-label {
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>ARKLE</h1>
  <div class="subtitle">Guess the daily Ark Nova animal · 8 chances</div>
  <div class="subtitle" style="font-size:0.7rem;margin-top:2px;opacity:0.5">v0.1</div>
</header>

<div class="legend">
  <div class="legend-item"><div class="swatch" style="background:var(--green)"></div> Exact match</div>
  <div class="legend-item"><div class="swatch" style="background:var(--yellow)"></div> Partial overlap</div>
  <div class="legend-item"><div class="swatch" style="background:var(--red)"></div> No match (↑↓ = direction to target)</div>
</div>

<div class="input-area">
  <div class="input-row">
    <input id="guess-input" type="text" placeholder="Type an animal name…" autocomplete="off" spellcheck="false" />
    <button id="submit-btn">GUESS</button>
  </div>
  <div class="autocomplete-list" id="autocomplete" style="display:none"></div>
</div>

<div class="status-line" id="status"></div>

<div class="table-wrapper">
  <table id="guess-table">
    <thead>
      <tr>
        <th>Animal</th>
        <th>Cost</th>
        <th>Size</th>
        <th>Tags</th>
        <th>Continents</th>
        <th>Appeal</th>
        <th>Conservation</th>
      </tr>
    </thead>
    <tbody id="guess-body"></tbody>
  </table>
</div>

<div class="message" id="message"></div>
<div class="reveal-answer" id="reveal"></div>
<button id="bonus-btn">PLAY ANOTHER PUZZLE</button>
<div class="bonus-label" id="bonus-label"></div>

<script src="animals.js"></script>
<script>

// ---------------------------------------------------------------------------
// Daily puzzle
// ---------------------------------------------------------------------------
function getDailyAnimal() {
  const epoch = new Date(2024, 0, 1);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const day = Math.floor((today - epoch) / 86400000);
  return ANIMALS[day % ANIMALS.length];
}

const MAX_GUESSES = 8;
let target = getDailyAnimal();
let guessesLeft = MAX_GUESSES;
let gameOver = false;
const guessed = new Set();
const usedAnimals = new Set([target.name]);
let bonusCount = 0;

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const input       = document.getElementById('guess-input');
const acList      = document.getElementById('autocomplete');
const submitBtn   = document.getElementById('submit-btn');
const guessBody   = document.getElementById('guess-body');
const messageEl   = document.getElementById('message');
const statusEl    = document.getElementById('status');
const revealEl    = document.getElementById('reveal');
const bonusBtn    = document.getElementById('bonus-btn');
const bonusLabel  = document.getElementById('bonus-label');

updateStatus();
updateBonusLabel();

// ---------------------------------------------------------------------------
// Autocomplete
// ---------------------------------------------------------------------------
let acItems = [];
let acIndex = -1;

input.addEventListener('input', renderAC);
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); movAC(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); movAC(-1); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIndex >= 0 && acItems[acIndex]) pick(acItems[acIndex].name);
    else makeGuess();
  } else if (e.key === 'Escape') hideAC();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-area')) hideAC();
});

submitBtn.addEventListener('click', makeGuess);

function renderAC() {
  const q = input.value.trim().toLowerCase();
  acIndex = -1;
  if (!q) { hideAC(); return; }
  acItems = ANIMALS.filter(a => a.name.toLowerCase().includes(q) && !guessed.has(a.name)).slice(0, 8);
  if (!acItems.length) { hideAC(); return; }
  acList.innerHTML = '';
  acItems.forEach((a, i) => {
    const d = document.createElement('div');
    d.textContent = a.name;
    d.addEventListener('mousedown', ev => { ev.preventDefault(); pick(a.name); });
    acList.appendChild(d);
  });
  acList.style.display = 'block';
}

function movAC(dir) {
  const divs = acList.querySelectorAll('div');
  acIndex = Math.max(-1, Math.min(acItems.length - 1, acIndex + dir));
  divs.forEach((d, i) => d.classList.toggle('ac-active', i === acIndex));
}

function hideAC() { acList.style.display = 'none'; acIndex = -1; }

function pick(name) {
  input.value = name;
  hideAC();
  input.focus();
}

// ---------------------------------------------------------------------------
// Game logic
// ---------------------------------------------------------------------------
function makeGuess() {
  if (gameOver) return;
  const name = input.value.trim();
  const animal = ANIMALS.find(a => a.name.toLowerCase() === name.toLowerCase());

  if (!animal) {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 500);
    return;
  }
  if (guessed.has(animal.name)) return;

  guessed.add(animal.name);
  guessesLeft--;
  input.value = '';
  hideAC();
  appendRow(animal);
  updateStatus();

  if (animal.name === target.name) {
    endGame(true);
  } else if (guessesLeft === 0) {
    endGame(false);
  }
}

function endGame(won) {
  gameOver = true;
  submitBtn.disabled = true;
  input.disabled = true;
  if (won) {
    messageEl.textContent = `Correct! You got it in ${MAX_GUESSES - guessesLeft} guess${MAX_GUESSES - guessesLeft === 1 ? '' : 'es'}.`;
    messageEl.className = 'message win';
  } else {
    messageEl.textContent = 'Out of guesses!';
    messageEl.className = 'message lose';
    revealEl.textContent = `The animal was: ${target.name}`;
  }
  updateBonusLabel();
}

function updateBonusLabel() {
  const remaining = ANIMALS.length - usedAnimals.size;
  if (remaining > 0) {
    bonusBtn.style.display = 'inline-block';
    bonusLabel.textContent = `${remaining} animal${remaining === 1 ? '' : 's'} left to discover`;
  } else {
    bonusBtn.style.display = 'none';
    bonusLabel.textContent = "You've played every animal!";
  }
}

function startBonusGame() {
  const pool = ANIMALS.filter(a => !usedAnimals.has(a.name));
  if (!pool.length) return;
  target = pool[Math.floor(Math.random() * pool.length)];
  usedAnimals.add(target.name);
  bonusCount++;

  guessesLeft = MAX_GUESSES;
  gameOver = false;
  guessed.clear();

  guessBody.innerHTML = '';
  messageEl.textContent = '';
  messageEl.className = 'message';
  revealEl.textContent = '';
  input.disabled = false;
  submitBtn.disabled = false;
  input.value = '';
  input.focus();
  updateStatus();
  updateBonusLabel();
}

bonusBtn.addEventListener('click', startBonusGame);

function updateStatus() {
  if (gameOver) { statusEl.textContent = ''; return; }
  statusEl.textContent = `${guessesLeft} guess${guessesLeft === 1 ? '' : 'es'} remaining`;
}

// ---------------------------------------------------------------------------
// Rendering a guess row
// ---------------------------------------------------------------------------
function compareNum(g, t) {
  if (g === t) return { cls: 'cell-green', label: String(g) };
  return { cls: 'cell-red', label: g + (g < t ? ' ↑' : ' ↓') };
}

function compareArr(g, t) {
  const tSet = new Set(t);
  const overlap = g.filter(x => tSet.has(x));
  const exact = overlap.length === t.length && g.length === t.length;
  if (exact)          return { cls: 'cell-green',  label: g.join(', ') };
  if (overlap.length) return { cls: 'cell-yellow', label: g.join(', ') };
  return               { cls: 'cell-red',   label: g.join(', ') };
}

function appendRow(animal) {
  const tr = document.createElement('tr');

  function addCell(cls, text, extraCls) {
    const td = document.createElement('td');
    if (extraCls) td.className = extraCls;
    else td.className = cls;
    td.textContent = text;
    tr.appendChild(td);
  }

  addCell('', animal.name, 'name-cell');

  const cost   = compareNum(animal.cost,         target.cost);
  const size   = compareNum(animal.size,         target.size);
  const tags   = compareArr(animal.tags,         target.tags);
  const conts  = compareArr(animal.continents,   target.continents);
  const appeal = compareNum(animal.appeal,       target.appeal);
  const cons   = compareNum(animal.conservation, target.conservation);

  addCell(cost.cls,   cost.label);
  addCell(size.cls,   size.label);
  addCell(tags.cls,   tags.label);
  addCell(conts.cls,  conts.label);
  addCell(appeal.cls, appeal.label);
  addCell(cons.cls,   cons.label);

  guessBody.appendChild(tr);
  tr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
